<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Drift v3 — Deep Space Flight</title>
<style>
  html, body { margin: 0; padding: 0; overflow: hidden; background: #000; height: 100%; }
  canvas { display: block; }

  #hud {
    position: fixed; inset: 0; pointer-events: none;
    font-family: "Lucida Console", Monaco, monospace;
    color: #6ee7d8; text-shadow: 0 0 6px rgba(110,231,216,.6);
    user-select: none; -webkit-user-select: none;
  }
  #crosshair {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
    width: 34px; height: 34px; opacity: .8;
  }
  #crosshair::before, #crosshair::after {
    content:""; position:absolute; background:#6ee7d8;
    box-shadow: 0 0 5px rgba(110,231,216,.8);
  }
  #crosshair::before { left: 50%; top: 0; width: 1px; height: 100%; transform: translateX(-50%); }
  #crosshair::after  { top: 50%; left: 0; height: 1px; width: 100%; transform: translateY(-50%); }
  #flightdata {
    position: absolute; left: 18px; bottom: 16px;
    font-size: 13px; line-height: 1.7; letter-spacing: 1px;
  }
  #flightdata .big { font-size: 26px; letter-spacing: 2px; }
  #flightdata .dim { opacity: .55; font-size: 11px; }
  #revtag { color: #ffb066; text-shadow: 0 0 6px rgba(255,176,102,.6); visibility: hidden; }
  #nearest {
    position: absolute; top: 14px; left: 50%; transform: translateX(-50%);
    font-size: 12px; letter-spacing: 2px; text-align: center; opacity: .9;
  }
  #nearest .name { font-size: 16px; }

  /* proximity alarm */
  #alarm {
    position: absolute; top: 62%; left: 50%; transform: translateX(-50%);
    color: #ff5544; text-shadow: 0 0 10px rgba(255,80,60,.8);
    font-size: 15px; letter-spacing: 4px; visibility: hidden;
    animation: blink .5s steps(2) infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }

  /* throttle bar with center marker: teal above = forward, amber below = reverse */
  #throttlewrap {
    position: absolute; right: 18px; bottom: 16px; text-align: right;
    font-size: 11px; letter-spacing: 1px;
  }
  #throttlebar {
    width: 14px; height: 120px; border: 1px solid rgba(110,231,216,.5);
    margin-left: auto; margin-top: 6px; position: relative;
  }
  #throttlezero {
    position: absolute; left: -4px; right: -4px; bottom: 33%;
    height: 1px; background: rgba(110,231,216,.8);
  }
  #throttlefwd {
    position: absolute; bottom: 33%; left: 0; right: 0; height: 0%;
    background: linear-gradient(to top, #14b8a6, #6ee7d8);
    box-shadow: 0 0 8px rgba(110,231,216,.7);
  }
  #throttlerev {
    position: absolute; top: 67%; left: 0; right: 0; height: 0%;
    background: linear-gradient(to bottom, #d98d3a, #ffb066);
    box-shadow: 0 0 8px rgba(255,176,102,.7);
  }
  #hint {
    position: absolute; top: 14px; left: 18px; font-size: 11px;
    line-height: 1.8; letter-spacing: 1px; opacity: .55;
  }
  .bracket { position:absolute; width: 40px; height: 40px; opacity:.4; }
  .bracket.tl { top:8px; left:8px; border-top:1px solid #6ee7d8; border-left:1px solid #6ee7d8; }
  .bracket.tr { top:8px; right:8px; border-top:1px solid #6ee7d8; border-right:1px solid #6ee7d8; }
  .bracket.bl { bottom:8px; left:8px; border-bottom:1px solid #6ee7d8; border-left:1px solid #6ee7d8; }
  .bracket.br { bottom:8px; right:8px; border-bottom:1px solid #6ee7d8; border-right:1px solid #6ee7d8; }

  .touchbtn {
    position: fixed; pointer-events: auto;
    width: 74px; height: 74px; border-radius: 50%;
    border: 1px solid rgba(110,231,216,.6); color:#6ee7d8;
    background: rgba(10,25,25,.45);
    font-family: monospace; font-size: 12px; letter-spacing:1px;
    display: none; align-items: center; justify-content: center;
    touch-action: none;
  }
  #btnThrust { right: 24px; bottom: 240px; }
  #btnBrake  { right: 24px; bottom: 150px; }
  #btnRev    { right: 24px; bottom: 60px; border-color: rgba(255,176,102,.6); color: #ffb066; }
  body.touch .touchbtn { display: flex; }
  body.touch #hint { display: none; }
</style>
</head>
<body>
<div id="hud">
  <div class="bracket tl"></div><div class="bracket tr"></div>
  <div class="bracket bl"></div><div class="bracket br"></div>
  <div id="crosshair"></div>
  <div id="hint">
    MOUSE — steer<br>
    W / S — throttle up / brake (stops at zero)<br>
    R — reverse thrust<br>
    SHIFT — boost &nbsp; Q / E — roll &nbsp; X — full stop
  </div>
  <div id="nearest">
    <span class="dim">NEAREST BODY</span><br>
    <span class="name" id="nearName">—</span><br>
    <span id="nearDist">—</span>
  </div>
  <div id="alarm">⚠ PROXIMITY ⚠</div>
  <div id="flightdata">
    <span class="dim">VELOCITY</span><br>
    <span class="big" id="speed">0</span> <span class="dim">u/s</span>
    <span id="revtag">◀ REV</span>
  </div>
  <div id="throttlewrap">
    THR<br>
    <div id="throttlebar">
      <div id="throttlefwd"></div>
      <div id="throttlerev"></div>
      <div id="throttlezero"></div>
    </div>
  </div>
</div>

<button class="touchbtn" id="btnThrust">THRUST</button>
<button class="touchbtn" id="btnBrake">BRAKE</button>
<button class="touchbtn" id="btnRev">REVERSE</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
/* =========================================================================
   DRIFT v3
   -------------------------------------------------------------------------
   New since v2:
     • Reverse thrust — throttle now runs from -0.5 to +1.0. Holding S past
       zero eases you backward. Perfect for backing away from a planet
       you're admiring. HUD bar splits: teal forward, amber reverse.
     • Collision physics — you now bounce off planets, moons, and the sun
       instead of ghosting through. Plus a flashing PROXIMITY alarm when
       you're closing in fast.
     • 3D name labels — each planet's name floats above it in space.
     • Engine audio — a synthesized hum (Web Audio API, no sound files)
       whose pitch and volume follow your throttle. Collisions thump.
       Browsers block audio until you interact, so it starts on your
       first key press or tap.
   ========================================================================= */

/* ============ 1. CONFIG — YOUR SOLAR SYSTEM ============ */
const BODIES = [
  {
    name: "HELIOS", type: "star",
    radius: 220, color: 0xffc873,
    position: [0, 0, -3000],
  },
  {
    name: "CINDER", type: "planet", style: "rocky",
    radius: 60, color: 0xc2553a,
    position: [-900, 80, -2200],
    spin: 0.02,
    atmosphere: 0xff6633,
  },
  {
    name: "AZURE", type: "planet", style: "ocean",
    radius: 95, color: 0x3a7bc2,
    position: [700, -120, -1500],
    spin: 0.015,
    atmosphere: 0x66aaff,
    moon: { radius: 18, distance: 200, speed: 0.25, color: 0x9aa3ad },
  },
  {
    name: "KRONOS", type: "planet", style: "gas",
    radius: 130, color: 0xc9a86b,
    position: [-400, 300, -600],
    spin: 0.01,
    atmosphere: 0xddbb77,
    rings: { inner: 170, outer: 280, color: 0x8a7a5c },
    belt: { inner: 300, outer: 420, count: 400 },
  },
  {
    name: "VERDANT", type: "planet", style: "ocean",
    radius: 45, color: 0x4caf6e,
    position: [1400, 200, -2800],
    spin: 0.03,
    atmosphere: 0x88ffaa,
  },
];

/* ============ 2. SCENE SETUP ============ */
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(70, innerWidth / innerHeight, 0.1, 50000);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0x223344, 0.7));

function makeStars(count, spread) {
  const geo = new THREE.BufferGeometry();
  const pos = new Float32Array(count * 3);
  for (let i = 0; i < count * 3; i += 3) {
    const r = spread * (0.4 + 0.6 * Math.random());
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(2 * Math.random() - 1);
    pos[i]     = r * Math.sin(phi) * Math.cos(theta);
    pos[i + 1] = r * Math.sin(phi) * Math.sin(theta);
    pos[i + 2] = r * Math.cos(phi);
  }
  geo.setAttribute("position", new THREE.BufferAttribute(pos, 3));
  return new THREE.Points(geo, new THREE.PointsMaterial({ color: 0xffffff, size: 2.2, sizeAttenuation: true }));
}
scene.add(makeStars(6000, 20000));
const neb1 = makeStars(1200, 18000); neb1.material.color.set(0x88aaff); neb1.material.size = 3.5;
const neb2 = makeStars(1200, 16000); neb2.material.color.set(0xff9977); neb2.material.size = 3.0;
scene.add(neb1, neb2);

function softBlobTexture(colorCss) {
  const cnv = document.createElement("canvas");
  cnv.width = cnv.height = 256;
  const ctx = cnv.getContext("2d");
  const g = ctx.createRadialGradient(128,128,10, 128,128,128);
  g.addColorStop(0, colorCss);
  g.addColorStop(1, "rgba(0,0,0,0)");
  ctx.fillStyle = g; ctx.fillRect(0,0,256,256);
  return new THREE.CanvasTexture(cnv);
}
const nebulaColors = ["rgba(90,60,160,0.16)", "rgba(160,60,90,0.13)", "rgba(40,110,140,0.15)"];
for (let i = 0; i < 9; i++) {
  const sp = new THREE.Sprite(new THREE.SpriteMaterial({
    map: softBlobTexture(nebulaColors[i % 3]),
    transparent: true, depthWrite: false, blending: THREE.AdditiveBlending,
  }));
  const r = 15000;
  const theta = Math.random() * Math.PI * 2;
  const phi = Math.acos(2 * Math.random() - 1);
  sp.position.set(r*Math.sin(phi)*Math.cos(theta), r*Math.sin(phi)*Math.sin(theta), r*Math.cos(phi));
  sp.scale.setScalar(6000 + Math.random() * 6000);
  scene.add(sp);
}

/* ============ 3. PROCEDURAL TEXTURE PAINTERS ============ */
function css(hex, mult = 1) {
  const c = new THREE.Color(hex).multiplyScalar(mult);
  return `rgb(${(c.r*255)|0},${(c.g*255)|0},${(c.b*255)|0})`;
}

function paintRocky(hex) {
  const cnv = document.createElement("canvas");
  cnv.width = 512; cnv.height = 256;
  const ctx = cnv.getContext("2d");
  ctx.fillStyle = css(hex, 0.85); ctx.fillRect(0, 0, 512, 256);
  for (let i = 0; i < 500; i++) {
    ctx.fillStyle = css(hex, 0.6 + Math.random() * 0.9);
    ctx.globalAlpha = 0.15;
    ctx.beginPath();
    ctx.arc(Math.random()*512, Math.random()*256, 4 + Math.random()*22, 0, 6.28);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
  for (let i = 0; i < 30; i++) {
    const x = Math.random()*512, y = 30 + Math.random()*196, r = 3 + Math.random()*9;
    ctx.fillStyle = css(hex, 0.45);
    ctx.beginPath(); ctx.arc(x, y, r, 0, 6.28); ctx.fill();
    ctx.strokeStyle = css(hex, 1.5); ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.arc(x, y, r, Math.PI*0.9, Math.PI*1.8); ctx.stroke();
  }
  return new THREE.CanvasTexture(cnv);
}

function paintGas(hex) {
  const cnv = document.createElement("canvas");
  cnv.width = 512; cnv.height = 256;
  const ctx = cnv.getContext("2d");
  for (let y = 0; y < 256; y++) {
    const wave = Math.sin(y * 0.10) * 0.22 + Math.sin(y * 0.031 + 2) * 0.18;
    ctx.fillStyle = css(hex, 0.85 + wave + (Math.random() - 0.5) * 0.05);
    ctx.fillRect(0, y, 512, 1);
  }
  for (let i = 0; i < 24; i++) {
    ctx.globalAlpha = 0.12;
    ctx.fillStyle = css(hex, 0.6 + Math.random() * 1.0);
    ctx.beginPath();
    ctx.ellipse(Math.random()*512, Math.random()*256, 25 + Math.random()*55, 4 + Math.random()*7, 0, 0, 6.28);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
  return new THREE.CanvasTexture(cnv);
}

function paintOcean(hex) {
  const cnv = document.createElement("canvas");
  cnv.width = 512; cnv.height = 256;
  const ctx = cnv.getContext("2d");
  ctx.fillStyle = css(hex, 0.9); ctx.fillRect(0, 0, 512, 256);
  const land = css(new THREE.Color(hex).offsetHSL(-0.12, 0.05, 0.02).getHex(), 1.1);
  const landDark = css(new THREE.Color(hex).offsetHSL(-0.12, 0.05, -0.06).getHex(), 1);
  for (let c = 0; c < 7; c++) {
    let x = Math.random()*512, y = 40 + Math.random()*176;
    for (let i = 0; i < 60; i++) {
      ctx.fillStyle = Math.random() < 0.7 ? land : landDark;
      ctx.beginPath();
      ctx.arc(x, y, 5 + Math.random()*14, 0, 6.28);
      ctx.fill();
      x = (x + (Math.random()-0.5)*30 + 512) % 512;
      y = Math.max(20, Math.min(236, y + (Math.random()-0.5)*22));
    }
  }
  ctx.fillStyle = "rgba(240,248,255,0.9)";
  ctx.fillRect(0, 0, 512, 14);
  ctx.fillRect(0, 242, 512, 14);
  ctx.fillStyle = "rgba(240,248,255,0.35)";
  ctx.fillRect(0, 14, 512, 8);
  ctx.fillRect(0, 234, 512, 8);
  for (let i = 0; i < 70; i++) {
    ctx.globalAlpha = 0.10 + Math.random()*0.10;
    ctx.fillStyle = "#ffffff";
    ctx.beginPath();
    ctx.ellipse(Math.random()*512, Math.random()*256, 15 + Math.random()*35, 3 + Math.random()*5, 0, 0, 6.28);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
  return new THREE.CanvasTexture(cnv);
}

const PAINTERS = { rocky: paintRocky, gas: paintGas, ocean: paintOcean };

/* ---- NEW: 3D name labels. Text drawn on a canvas, shown as a sprite. ---- */
function makeLabel(text) {
  const cnv = document.createElement("canvas");
  cnv.width = 512; cnv.height = 128;
  const ctx = cnv.getContext("2d");
  ctx.font = "bold 56px monospace";
  ctx.textAlign = "center"; ctx.textBaseline = "middle";
  ctx.shadowColor = "rgba(110,231,216,0.9)"; ctx.shadowBlur = 18;
  ctx.fillStyle = "#bffef4";
  ctx.fillText(text, 256, 64);
  const sprite = new THREE.Sprite(new THREE.SpriteMaterial({
    map: new THREE.CanvasTexture(cnv),
    transparent: true, depthWrite: false, opacity: 0.85,
  }));
  return sprite;
}

/* ============ 4. BODY BUILDER ============ */
const liveBodies = [];
const belts = [];

function buildBody(cfg) {
  const group = new THREE.Group();
  group.position.set(...cfg.position);

  if (cfg.type === "star") {
    group.add(new THREE.Mesh(
      new THREE.SphereGeometry(cfg.radius, 48, 32),
      new THREE.MeshBasicMaterial({ color: cfg.color })
    ));
    group.add(new THREE.PointLight(0xffe0b0, 2.2, 0, 2));
    const glow = new THREE.Sprite(new THREE.SpriteMaterial({
      map: softBlobTexture("rgba(255,215,150,0.85)"),
      transparent: true, depthWrite: false,
    }));
    glow.scale.setScalar(cfg.radius * 7);
    group.add(glow);
  } else {
    const painter = PAINTERS[cfg.style] || paintRocky;
    const tex = painter(cfg.color);
    tex.wrapS = THREE.RepeatWrapping;
    const mesh = new THREE.Mesh(
      new THREE.SphereGeometry(cfg.radius, 48, 32),
      new THREE.MeshStandardMaterial({ map: tex, roughness: 0.95, metalness: 0.0 })
    );
    mesh.name = "surface";
    group.add(mesh);

    if (cfg.atmosphere) {
      const c = new THREE.Color(cfg.atmosphere);
      const halo = new THREE.Sprite(new THREE.SpriteMaterial({
        map: softBlobTexture(`rgba(${(c.r*255)|0},${(c.g*255)|0},${(c.b*255)|0},0.55)`),
        transparent: true, depthWrite: false,
      }));
      halo.scale.setScalar(cfg.radius * 2.75);
      group.add(halo);
    }

    if (cfg.rings) {
      const ring = new THREE.Mesh(
        new THREE.RingGeometry(cfg.rings.inner, cfg.rings.outer, 64),
        new THREE.MeshBasicMaterial({ color: cfg.rings.color, side: THREE.DoubleSide, transparent: true, opacity: 0.5 })
      );
      ring.rotation.x = Math.PI / 2.4;
      group.add(ring);
      const ring2 = new THREE.Mesh(
        new THREE.RingGeometry(cfg.rings.inner * 0.92, cfg.rings.inner * 0.98, 64),
        new THREE.MeshBasicMaterial({ color: cfg.rings.color, side: THREE.DoubleSide, transparent: true, opacity: 0.8 })
      );
      ring2.rotation.x = Math.PI / 2.4;
      group.add(ring2);
    }

    if (cfg.belt) {
      const rocks = new THREE.InstancedMesh(
        new THREE.DodecahedronGeometry(1, 0),
        new THREE.MeshStandardMaterial({ color: 0x8a8378, roughness: 1, flatShading: true }),
        cfg.belt.count
      );
      const dummy = new THREE.Object3D();
      for (let i = 0; i < cfg.belt.count; i++) {
        const ang = Math.random() * Math.PI * 2;
        const dist = cfg.belt.inner + Math.random() * (cfg.belt.outer - cfg.belt.inner);
        dummy.position.set(Math.cos(ang) * dist, (Math.random() - 0.5) * 26, Math.sin(ang) * dist);
        dummy.rotation.set(Math.random()*6.28, Math.random()*6.28, Math.random()*6.28);
        dummy.scale.setScalar(1.5 + Math.random() * 6);
        dummy.updateMatrix();
        rocks.setMatrixAt(i, dummy.matrix);
      }
      const beltGroup = new THREE.Group();
      beltGroup.rotation.x = Math.PI / 2.4 - Math.PI / 2;
      beltGroup.add(rocks);
      group.add(beltGroup);
      belts.push(beltGroup);
    }

    if (cfg.moon) {
      const moon = new THREE.Mesh(
        new THREE.SphereGeometry(cfg.moon.radius, 20, 14),
        new THREE.MeshStandardMaterial({ map: paintRocky(cfg.moon.color), roughness: 1 })
      );
      moon.userData.orbit = { distance: cfg.moon.distance, speed: cfg.moon.speed, angle: Math.random() * 6.28 };
      moon.name = "moon";
      group.add(moon);
    }

    // floating name tag above the planet
    const label = makeLabel(cfg.name);
    label.position.y = cfg.radius * 1.7;
    label.scale.set(cfg.radius * 2.2, cfg.radius * 0.55, 1);
    group.add(label);
  }

  scene.add(group);
  liveBodies.push({ cfg, group });
}
BODIES.forEach(buildBody);

/* ============ 5. SPACE DUST ============ */
const DUST_COUNT = 350, DUST_SIZE = 500, DUST_HALF = DUST_SIZE / 2;
const dustGeo = new THREE.BufferGeometry();
const dustPos = new Float32Array(DUST_COUNT * 3);
for (let i = 0; i < dustPos.length; i++) dustPos[i] = (Math.random() - 0.5) * DUST_SIZE;
dustGeo.setAttribute("position", new THREE.BufferAttribute(dustPos, 3));
const dustMat = new THREE.PointsMaterial({ color: 0xaad4cc, size: 1.6, transparent: true, opacity: 0, depthWrite: false });
scene.add(new THREE.Points(dustGeo, dustMat));
const dust = scene.children[scene.children.length - 1];

/* ============ 6. ENGINE AUDIO ============
   No sound files — we synthesize the hum with the Web Audio API:
   two slightly-detuned sawtooth oscillators (the detune makes it "throb"
   like real machinery — same beat-frequency effect as two compressors
   running side by side) fed through a lowpass filter so it rumbles
   instead of buzzes. Volume + pitch track the throttle each frame. */
let audio = null;
function initAudio() {
  if (audio) return;
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const gain = ctx.createGain(); gain.gain.value = 0;
  const filter = ctx.createBiquadFilter();
  filter.type = "lowpass"; filter.frequency.value = 220;
  const osc1 = ctx.createOscillator(); osc1.type = "sawtooth"; osc1.frequency.value = 48;
  const osc2 = ctx.createOscillator(); osc2.type = "sawtooth"; osc2.frequency.value = 48.7;
  osc1.connect(filter); osc2.connect(filter);
  filter.connect(gain); gain.connect(ctx.destination);
  osc1.start(); osc2.start();
  audio = { ctx, gain, filter, osc1, osc2 };
}
// collision thump: a short burst of filtered noise
function thump(strength) {
  if (!audio) return;
  const { ctx } = audio;
  const len = ctx.sampleRate * 0.15;
  const buf = ctx.createBuffer(1, len, ctx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < len; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / len); // fade out
  const src = ctx.createBufferSource(); src.buffer = buf;
  const f = ctx.createBiquadFilter(); f.type = "lowpass"; f.frequency.value = 150;
  const g = ctx.createGain(); g.gain.value = Math.min(0.5, strength / 400);
  src.connect(f); f.connect(g); g.connect(ctx.destination);
  src.start();
}
// browsers require a user gesture before audio can start
["keydown", "mousedown", "touchstart"].forEach(ev =>
  addEventListener(ev, initAudio, { once: false })
);

/* ============ 7. SHIP PHYSICS ============
   Throttle range is now -0.5 .. +1.0.
   Positive = forward thrust, negative = reverse thrust (half power,
   just like real maneuvering thrusters are weaker than the mains). */
const ship = {
  velocity: new THREE.Vector3(),
  throttle: 0,
  minThrottle: -0.5,     // NEW: reverse limit
  maxAccel: 220,
  boostMult: 2.5,
  damping: 0.995,
  turnSpeed: 1.6,
};
camera.position.set(0, 0, 600);

/* ============ 8. INPUT ============ */
const keys = {};
addEventListener("keydown", e => keys[e.code] = true);
addEventListener("keyup",   e => keys[e.code] = false);

const steer = { x: 0, y: 0 };
addEventListener("mousemove", e => {
  steer.x = (e.clientX / innerWidth  - 0.5) * 2;
  steer.y = (e.clientY / innerHeight - 0.5) * 2;
});

let touchThrust = false, touchBrake = false, touchRev = false;
if (matchMedia("(pointer: coarse)").matches) document.body.classList.add("touch");

let steerTouchId = null, steerStart = null;
addEventListener("touchstart", e => {
  for (const t of e.changedTouches) {
    if (t.target.classList && t.target.classList.contains("touchbtn")) continue;
    if (steerTouchId === null) { steerTouchId = t.identifier; steerStart = { x: t.clientX, y: t.clientY }; }
  }
}, { passive: true });
addEventListener("touchmove", e => {
  for (const t of e.changedTouches) {
    if (t.identifier === steerTouchId) {
      steer.x = Math.max(-1, Math.min(1, (t.clientX - steerStart.x) / 120));
      steer.y = Math.max(-1, Math.min(1, (t.clientY - steerStart.y) / 120));
    }
  }
}, { passive: true });
addEventListener("touchend", e => {
  for (const t of e.changedTouches) {
    if (t.identifier === steerTouchId) { steerTouchId = null; steer.x = 0; steer.y = 0; }
  }
});
const bindHold = (id, setter) => {
  const el = document.getElementById(id);
  el.addEventListener("touchstart", e => { e.preventDefault(); initAudio(); setter(true); });
  el.addEventListener("touchend",   e => { e.preventDefault(); setter(false); });
};
bindHold("btnThrust", v => touchThrust = v);
bindHold("btnBrake",  v => touchBrake  = v);
bindHold("btnRev",    v => touchRev    = v);

/* ============ 9. GAME LOOP ============ */
const clock = new THREE.Clock();
const speedEl = document.getElementById("speed");
const nearNameEl = document.getElementById("nearName");
const nearDistEl = document.getElementById("nearDist");
const throttleFwd = document.getElementById("throttlefwd");
const throttleRev = document.getElementById("throttlerev");
const alarmEl = document.getElementById("alarm");
const revTag = document.getElementById("revtag");
const tmpDir = new THREE.Vector3();
const tmpNormal = new THREE.Vector3();
let prevNearestDist = Infinity;

function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);

  /* ---- throttle ---- */
  if (keys["KeyW"] || touchThrust) ship.throttle = Math.min(1, ship.throttle + dt * 1.2);
  // brake (S) eases the throttle toward ZERO from either direction — never past it
  if (keys["KeyS"] || touchBrake) {
    if (ship.throttle > 0)      ship.throttle = Math.max(0, ship.throttle - dt * 1.2);
    else if (ship.throttle < 0) ship.throttle = Math.min(0, ship.throttle + dt * 1.2);
  }
  // reverse is its own control now: R key (or REVERSE button on touch)
  if (keys["KeyR"] || touchRev) ship.throttle = Math.max(ship.minThrottle, ship.throttle - dt * 1.2);
  if (keys["KeyX"]) { ship.throttle = 0; ship.velocity.multiplyScalar(0.9); }

  /* ---- steering ---- */
  const dead = 0.08;
  const sx = Math.abs(steer.x) > dead ? steer.x : 0;
  const sy = Math.abs(steer.y) > dead ? steer.y : 0;
  camera.rotateY(-sx * ship.turnSpeed * dt);
  camera.rotateX(-sy * ship.turnSpeed * dt);
  if (keys["KeyQ"]) camera.rotateZ( 1.5 * dt);
  if (keys["KeyE"]) camera.rotateZ(-1.5 * dt);

  /* ---- thrust: throttle sign handles forward vs reverse ---- */
  camera.getWorldDirection(tmpDir);
  const boost = (keys["ShiftLeft"] || keys["ShiftRight"]) ? ship.boostMult : 1;
  ship.velocity.addScaledVector(tmpDir, ship.throttle * ship.maxAccel * boost * dt);
  ship.velocity.multiplyScalar(ship.damping);
  camera.position.addScaledVector(ship.velocity, dt);

  /* ---- COLLISION: check every body (and moons) ----
     If we've penetrated a body's surface: push the ship back out along
     the surface normal, then remove the inward part of our velocity and
     flip a fraction of it (a soft bounce, not a superball). */
  const COLLIDE_BUFFER = 12; // hull clearance in units
  for (const b of liveBodies) {
    // main body
    tmpNormal.subVectors(camera.position, b.group.position);
    let dist = tmpNormal.length();
    let minDist = b.cfg.radius + COLLIDE_BUFFER;
    if (dist < minDist) {
      tmpNormal.normalize();
      camera.position.copy(b.group.position).addScaledVector(tmpNormal, minDist);
      const into = ship.velocity.dot(tmpNormal); // negative = moving inward
      if (into < 0) {
        thump(-into);
        ship.velocity.addScaledVector(tmpNormal, -into * 1.3); // cancel + 30% bounce
      }
    }
    // its moon, if any (moon position is relative to the planet group)
    const moon = b.group.getObjectByName("moon");
    if (moon) {
      tmpNormal.copy(moon.position).add(b.group.position).sub(camera.position).negate();
      dist = tmpNormal.length();
      minDist = b.cfg.moon.radius + COLLIDE_BUFFER;
      if (dist < minDist) {
        tmpNormal.normalize();
        camera.position.copy(b.group.position).add(moon.position).addScaledVector(tmpNormal, minDist);
        const into = ship.velocity.dot(tmpNormal);
        if (into < 0) {
          thump(-into);
          ship.velocity.addScaledVector(tmpNormal, -into * 1.3);
        }
      }
    }
  }

  /* ---- animate bodies ---- */
  for (const b of liveBodies) {
    if (b.cfg.spin) {
      const surf = b.group.getObjectByName("surface");
      if (surf) surf.rotation.y += b.cfg.spin * dt * 10;
    }
    const moon = b.group.getObjectByName("moon");
    if (moon) {
      const o = moon.userData.orbit;
      o.angle += o.speed * dt;
      moon.position.set(Math.cos(o.angle) * o.distance, 0, Math.sin(o.angle) * o.distance);
    }
  }
  for (const belt of belts) belt.rotation.y += 0.02 * dt;

  /* ---- space dust ---- */
  const p = dust.geometry.attributes.position.array;
  const cx = camera.position.x, cy = camera.position.y, cz = camera.position.z;
  for (let i = 0; i < p.length; i += 3) {
    p[i]   = (((p[i]   - cx + DUST_HALF) % DUST_SIZE) + DUST_SIZE) % DUST_SIZE - DUST_HALF + cx;
    p[i+1] = (((p[i+1] - cy + DUST_HALF) % DUST_SIZE) + DUST_SIZE) % DUST_SIZE - DUST_HALF + cy;
    p[i+2] = (((p[i+2] - cz + DUST_HALF) % DUST_SIZE) + DUST_SIZE) % DUST_SIZE - DUST_HALF + cz;
  }
  dust.geometry.attributes.position.needsUpdate = true;
  const spd = ship.velocity.length();
  dustMat.opacity = Math.min(0.65, spd / 350);

  /* ---- engine audio follows throttle ---- */
  if (audio) {
    const t = Math.abs(ship.throttle);
    const boosting = boost > 1 && ship.throttle > 0;
    audio.gain.gain.value = t * 0.10 * (boosting ? 1.7 : 1);
    audio.filter.frequency.value = 180 + t * 500 + (boosting ? 400 : 0);
    const f = 44 + t * 38 + (boosting ? 14 : 0);
    audio.osc1.frequency.value = f;
    audio.osc2.frequency.value = f * 1.014; // stays slightly detuned
  }

  /* ---- HUD ---- */
  speedEl.textContent = Math.round(spd);
  revTag.style.visibility = ship.throttle < -0.01 ? "visible" : "hidden";
  if (ship.throttle >= 0) {
    throttleFwd.style.height = (ship.throttle * 67) + "%";
    throttleRev.style.height = "0%";
  } else {
    throttleFwd.style.height = "0%";
    throttleRev.style.height = (Math.abs(ship.throttle) / 0.5 * 33) + "%";
  }

  let nearest = null, nearestDist = Infinity;
  for (const b of liveBodies) {
    const d = camera.position.distanceTo(b.group.position) - b.cfg.radius;
    if (d < nearestDist) { nearestDist = d; nearest = b; }
  }
  if (nearest) {
    nearNameEl.textContent = nearest.cfg.name;
    nearDistEl.textContent = Math.round(nearestDist).toLocaleString() + " u";
  }
  // proximity alarm: close AND closing fast
  const closingSpeed = (prevNearestDist - nearestDist) / dt;
  alarmEl.style.visibility =
    (nearestDist < 250 && closingSpeed > 60) ? "visible" : "hidden";
  prevNearestDist = nearestDist;

  renderer.render(scene, camera);
}
animate();

addEventListener("resize", () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
