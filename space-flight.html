    content:""; position:absolute; background:#6ee7d8;

<script>
/* =========================================================================
   SPACESUCK v8 — pilot's remap
   -------------------------------------------------------------------------
   New since v7 (see git log for the full story):

     • CONTROL REMAP, straight from the test pilot: A/D now ROLL left and
       right; all turning lives on the arrow keys (←/→ turn, ↑/↓ pitch)
       and the mouse. S is pure reverse thrust — it ramps the throttle
       negative exactly the way W ramps it positive. X is the full
       shutdown: throttle to zero, scrub velocity until you're parked.
       Q/E and R are retired.

   Still in from v7: auto-bank lean into turns (cosmetic only — the
   physics never roll), pointer-lock mouse steering, 4× world spread as
   step one toward multiple solar systems.
   ========================================================================= */

if (typeof THREE === "undefined") {
  document.getElementById("loading").textContent =
    "COULD NOT LOAD three.js — keep three.min.js next to this file, or reconnect to the internet";
  throw new Error("three.js failed to load");
}

/* ============ 1. CONFIG — YOUR SOLAR SYSTEM ============ */
const BODIES = [
  {
    name: "HELIOS", type: "star",
    radius: 220, color: 0xffc873, seed: 7,
    position: [0, 0, -12000],
  },
  {
    name: "CINDER", type: "planet", style: "rocky", seed: 11,
    radius: 60,
    position: [-3600, 320, -8800],
    spin: 0.02,
    atmosphere: 0xcc5522, atmoStrength: 0.5,
    palette: { dark: 0x4a2318, mid: 0x9c4a2e, light: 0xd98d5f },
  },
  {
    name: "AZURE", type: "planet", style: "terrestrial", seed: 42,
    radius: 95,
    position: [2800, -480, -6000],
    spin: 0.015,
    clouds: true,
    atmosphere: 0x5599ff, atmoStrength: 1.0,
    palette: {
      deep: 0x0a2d52, shallow: 0x1a6b8f, sand: 0xc2b280,
      low: 0x3d7a3d, high: 0x6b5d45, snow: 0xf0f5fa,
    },
    moon: { radius: 18, distance: 220, speed: 0.25, color: 0x9aa3ad, seed: 5 },
  },
  {
    name: "KRONOS", type: "planet", style: "gas", seed: 23,
    radius: 130,
    position: [-1600, 1200, -2400],
    spin: 0.01,
    atmosphere: 0xddbb77, atmoStrength: 0.7,
    palette: { dark: 0x7a5c38, mid: 0xc9a86b, light: 0xf0dcae },
    rings: { inner: 170, outer: 280, color: 0x8a7a5c },
    belt: { inner: 300, outer: 420, count: 400 },
  },
  {
    name: "VERDANT", type: "planet", style: "terrestrial", seed: 99,
    radius: 45,
    position: [5600, 800, -11200],
    spin: 0.03,
    clouds: true,
    atmosphere: 0x77ffaa, atmoStrength: 0.9,
    palette: {
      deep: 0x0d3d33, shallow: 0x1f7a5c, sand: 0xb5c28a,
      low: 0x3f8f2e, high: 0x5c7a3d, snow: 0xeafaef,
    },
  },
];

/* ============ 2. NOISE ENGINE ============ */
function mulberry32(seed) {
  return function() {
    seed |= 0; seed = seed + 0x6D2B79F5 | 0;
    let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}
function makePerm(seed) {
  const rand = mulberry32(seed);
  const p = new Uint8Array(256);
  for (let i = 0; i < 256; i++) p[i] = i;
  for (let i = 255; i > 0; i--) {
    const j = (rand() * (i + 1)) | 0;
    [p[i], p[j]] = [p[j], p[i]];
  }
  const perm = new Uint8Array(512);
  for (let i = 0; i < 512; i++) perm[i] = p[i & 255];
  return perm;
}
function makeNoise(perm) {
  const fade = t => t * t * (3 - 2 * t);
  const corner = (xi, yi, zi) => perm[(perm[(perm[xi & 255] + yi) & 255] + zi) & 255] / 255;
  return function noise3(x, y, z) {
    const xi = Math.floor(x), yi = Math.floor(y), zi = Math.floor(z);
    const xf = fade(x - xi), yf = fade(y - yi), zf = fade(z - zi);
    const c000 = corner(xi, yi, zi),     c100 = corner(xi+1, yi, zi);
    const c010 = corner(xi, yi+1, zi),   c110 = corner(xi+1, yi+1, zi);
    const c001 = corner(xi, yi, zi+1),   c101 = corner(xi+1, yi, zi+1);
    const c011 = corner(xi, yi+1, zi+1), c111 = corner(xi+1, yi+1, zi+1);
    const x00 = c000 + (c100 - c000) * xf, x10 = c010 + (c110 - c010) * xf;
    const x01 = c001 + (c101 - c001) * xf, x11 = c011 + (c111 - c011) * xf;
    const y0 = x00 + (x10 - x00) * yf, y1 = x01 + (x11 - x01) * yf;
    return y0 + (y1 - y0) * zf;
  };
}
function makeFbm(noise3) {
  return function fbm(x, y, z, octaves) {
    let sum = 0, amp = 0.5, freq = 1, norm = 0;
    for (let o = 0; o < octaves; o++) {
      sum += noise3(x * freq, y * freq, z * freq) * amp;
      norm += amp;
      amp *= 0.5; freq *= 2;
    }
    return sum / norm;
  };
}

/* ============ 3. PLANET TEXTURE GENERATORS ============ */
const TEX_W = 1024, TEX_H = 512;          // rocky / gas planets
const TEX_W_HI = 2048, TEX_H_HI = 1024;   // terrestrial planets — the ones you fly close to

function hexToRgb(hex) {
  const c = new THREE.Color(hex);
  return [c.r * 255, c.g * 255, c.b * 255];
}
function lerp3(a, b, t) {
  return [a[0]+(b[0]-a[0])*t, a[1]+(b[1]-a[1])*t, a[2]+(b[2]-a[2])*t];
}
function canvasFromData(data, w, h) {
  const cnv = document.createElement("canvas");
  cnv.width = w; cnv.height = h;
  cnv.getContext("2d").putImageData(new ImageData(data, w, h), 0, 0);
  const tex = new THREE.CanvasTexture(cnv);
  tex.wrapS = THREE.RepeatWrapping;
  return tex;
}

function genTerrestrial(cfg) {
  const W = TEX_W_HI, H = TEX_H_HI;   // hi-res: these are the planets you buzz the surface of
  const fbm = makeFbm(makeNoise(makePerm(cfg.seed)));
  const pal = {
    deep: hexToRgb(cfg.palette.deep),   shallow: hexToRgb(cfg.palette.shallow),
    sand: hexToRgb(cfg.palette.sand),   low: hexToRgb(cfg.palette.low),
    high: hexToRgb(cfg.palette.high),   snow: hexToRgb(cfg.palette.snow),
  };
  const color = new Uint8ClampedArray(W * H * 4);
  const bump  = new Uint8ClampedArray(W * H * 4);
  const rough = new Uint8ClampedArray(W * H * 4);
  const SEA = 0.52, SCALE = 2.3;

  for (let y = 0; y < H; y++) {
    const phi = (y + 0.5) / H * Math.PI;
    const sinP = Math.sin(phi), cosP = Math.cos(phi);
    const lat = Math.abs(cosP);
    for (let x = 0; x < W; x++) {
      const theta = (x + 0.5) / W * Math.PI * 2;
      const px = sinP * Math.cos(theta), py = cosP, pz = sinP * Math.sin(theta);

      let h = fbm(px * SCALE + 10, py * SCALE + 10, pz * SCALE + 10, 6);
      h = (h - 0.5) * 2.6 + 0.5;
      h = Math.max(0, Math.min(1, h));

      const temp = 1.15 - Math.pow(lat, 1.7) * 1.35 - Math.max(0, h - SEA) * 1.4;

      let rgb, roughness;
      if (h < SEA) {
        const depth = (SEA - h) / SEA;
        rgb = lerp3(pal.shallow, pal.deep, Math.min(1, depth * 2.2));
        if (temp < 0.02) rgb = lerp3(rgb, pal.snow, 0.9);
        roughness = temp < 0.02 ? 200 : 70;
      } else {
        const alt = (h - SEA) / (1 - SEA);
        if      (alt < 0.06) rgb = pal.sand;
        else if (alt < 0.45) rgb = lerp3(pal.low, pal.high, alt / 0.45 * 0.5);
        else                 rgb = lerp3(pal.low, pal.high, 0.5 + (alt - 0.45) * 0.9);
        if (temp < 0.15) rgb = lerp3(rgb, pal.snow, Math.min(1, (0.15 - temp) * 9));
        roughness = 235;
      }

      const i = (y * W + x) * 4;
      color[i] = rgb[0]; color[i+1] = rgb[1]; color[i+2] = rgb[2]; color[i+3] = 255;
      const bh = h < SEA ? 90 : 90 + ((h - SEA) / (1 - SEA)) * 165;
      bump[i] = bump[i+1] = bump[i+2] = bh; bump[i+3] = 255;
      rough[i] = rough[i+1] = rough[i+2] = roughness; rough[i+3] = 255;
    }
  }
  return {
    map: canvasFromData(color, W, H),
    bumpMap: canvasFromData(bump, W, H),
    roughnessMap: canvasFromData(rough, W, H),
  };
}

function genRocky(cfg) {
  const fbm = makeFbm(makeNoise(makePerm(cfg.seed)));
  const dark = hexToRgb(cfg.palette.dark), mid = hexToRgb(cfg.palette.mid), light = hexToRgb(cfg.palette.light);
  const color = new Uint8ClampedArray(TEX_W * TEX_H * 4);
  const bump  = new Uint8ClampedArray(TEX_W * TEX_H * 4);

  for (let y = 0; y < TEX_H; y++) {
    const phi = (y + 0.5) / TEX_H * Math.PI;
    const sinP = Math.sin(phi), cosP = Math.cos(phi);
    for (let x = 0; x < TEX_W; x++) {
      const theta = (x + 0.5) / TEX_W * Math.PI * 2;
      const px = sinP * Math.cos(theta), py = cosP, pz = sinP * Math.sin(theta);

      const h = fbm(px * 3 + 5, py * 3 + 5, pz * 3 + 5, 6);
      const ridge = 1 - Math.abs(fbm(px * 6, py * 6, pz * 6, 4) - 0.5) * 2;
      const v = Math.max(0, Math.min(1, h * 0.7 + ridge * 0.3));

      const rgb = v < 0.5 ? lerp3(dark, mid, v * 2) : lerp3(mid, light, (v - 0.5) * 2);
      const i = (y * TEX_W + x) * 4;
      color[i] = rgb[0]; color[i+1] = rgb[1]; color[i+2] = rgb[2]; color[i+3] = 255;
      const bh = 60 + v * 195;
      bump[i] = bump[i+1] = bump[i+2] = bh; bump[i+3] = 255;
    }
  }
  return { map: canvasFromData(color, TEX_W, TEX_H), bumpMap: canvasFromData(bump, TEX_W, TEX_H) };
}

function genGas(cfg) {
  const fbm = makeFbm(makeNoise(makePerm(cfg.seed)));
  const dark = hexToRgb(cfg.palette.dark), mid = hexToRgb(cfg.palette.mid), light = hexToRgb(cfg.palette.light);
  const color = new Uint8ClampedArray(TEX_W * TEX_H * 4);

  for (let y = 0; y < TEX_H; y++) {
    const phi = (y + 0.5) / TEX_H * Math.PI;
    const sinP = Math.sin(phi), cosP = Math.cos(phi);
    for (let x = 0; x < TEX_W; x++) {
      const theta = (x + 0.5) / TEX_W * Math.PI * 2;
      const px = sinP * Math.cos(theta), py = cosP, pz = sinP * Math.sin(theta);

      const warp = (fbm(px * 3, py * 3, pz * 3, 4) - 0.5) * 0.55;
      const band = Math.sin((py + warp) * 14) * 0.5 + 0.5;
      const turb = fbm(px * 8 + 30, py * 8 + 30, pz * 8 + 30, 3);

      let rgb = band < 0.5 ? lerp3(dark, mid, band * 2) : lerp3(mid, light, (band - 0.5) * 2);
      rgb = lerp3(rgb, mid, (turb - 0.5) * 0.4 + 0.2);
      const storm = fbm(px * 2 + 77, py * 2 + 77, pz * 2 + 77, 3);
      if (storm > 0.66) rgb = lerp3(rgb, light, Math.min(1, (storm - 0.66) * 8));

      const i = (y * TEX_W + x) * 4;
      color[i] = rgb[0]; color[i+1] = rgb[1]; color[i+2] = rgb[2]; color[i+3] = 255;
    }
  }
  return { map: canvasFromData(color, TEX_W, TEX_H) };
}

function genClouds(seed) {
  const fbm = makeFbm(makeNoise(makePerm(seed + 1000)));
  const W = 512, H = 256;
  const data = new Uint8ClampedArray(W * H * 4);
  for (let y = 0; y < H; y++) {
    const phi = (y + 0.5) / H * Math.PI;
    const sinP = Math.sin(phi), cosP = Math.cos(phi);
    for (let x = 0; x < W; x++) {
      const theta = (x + 0.5) / W * Math.PI * 2;
      const px = sinP * Math.cos(theta), py = cosP, pz = sinP * Math.sin(theta);
      const n = fbm(px * 3.5, py * 3.5, pz * 3.5, 5);
      let a = (n - 0.52) / 0.10;
      a = Math.max(0, Math.min(1, a));
      a = a * a * (3 - 2 * a);
      const i = (y * W + x) * 4;
      data[i] = data[i+1] = data[i+2] = 255; data[i+3] = a * 230;
    }
  }
  return canvasFromData(data, W, H);
}

function genSun(cfg) {
  const fbm = makeFbm(makeNoise(makePerm(cfg.seed)));
  const W = 512, H = 256;
  const hot = hexToRgb(0xfff3c9), warm = hexToRgb(cfg.color), deep = hexToRgb(0xe07820);
  const data = new Uint8ClampedArray(W * H * 4);
  for (let y = 0; y < H; y++) {
    const phi = (y + 0.5) / H * Math.PI;
    const sinP = Math.sin(phi), cosP = Math.cos(phi);
    for (let x = 0; x < W; x++) {
      const theta = (x + 0.5) / W * Math.PI * 2;
      const n = fbm(sinP*Math.cos(theta)*6, cosP*6, sinP*Math.sin(theta)*6, 5);
      const rgb = n < 0.5 ? lerp3(deep, warm, n * 2) : lerp3(warm, hot, (n - 0.5) * 2);
      const i = (y * W + x) * 4;
      data[i] = rgb[0]; data[i+1] = rgb[1]; data[i+2] = rgb[2]; data[i+3] = 255;
    }
  }
  return canvasFromData(data, W, H);
}

/* ============ 4. ATMOSPHERE SHADER ============ */
function makeAtmosphere(radius, colorHex, strength) {
  const mat = new THREE.ShaderMaterial({
    uniforms: {
      atmoColor: { value: new THREE.Color(colorHex) },
      strength: { value: strength },
    },
    vertexShader: `
      varying vec3 vNormal;
      varying vec3 vView;
      void main() {
        vNormal = normalize(normalMatrix * normal);
        vec4 mv = modelViewMatrix * vec4(position, 1.0);
        vView = normalize(-mv.xyz);
        gl_Position = projectionMatrix * mv;
      }`,
    fragmentShader: `
      uniform vec3 atmoColor;
      uniform float strength;
      varying vec3 vNormal;
      varying vec3 vView;
      void main() {
        float rim = pow(1.0 - abs(dot(vNormal, vView)), 2.5);
        gl_FragColor = vec4(atmoColor, rim * strength);
      }`,
    transparent: true,
    side: THREE.BackSide,
    depthWrite: false,
    blending: THREE.AdditiveBlending,
  });
  return new THREE.Mesh(new THREE.SphereGeometry(radius * 1.14, 48, 32), mat);
}

/* ============ 5. SCENE SETUP ============ */
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(70, innerWidth / innerHeight, 0.1, 50000);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0x1c2836, 0.8));

function makeStars(count, spread) {
  const geo = new THREE.BufferGeometry();
  const pos = new Float32Array(count * 3);
  for (let i = 0; i < count * 3; i += 3) {
    const r = spread * (0.4 + 0.6 * Math.random());
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(2 * Math.random() - 1);
    pos[i]     = r * Math.sin(phi) * Math.cos(theta);
    pos[i + 1] = r * Math.sin(phi) * Math.sin(theta);
    pos[i + 2] = r * Math.cos(phi);
  }
  geo.setAttribute("position", new THREE.BufferAttribute(pos, 3));
  return new THREE.Points(geo, new THREE.PointsMaterial({ color: 0xffffff, size: 2.2, sizeAttenuation: true }));
}

function softBlobTexture(colorCss) {
  const cnv = document.createElement("canvas");
  cnv.width = cnv.height = 256;
  const ctx = cnv.getContext("2d");
  const g = ctx.createRadialGradient(128,128,10, 128,128,128);
  g.addColorStop(0, colorCss);
  g.addColorStop(1, "rgba(0,0,0,0)");
  ctx.fillStyle = g; ctx.fillRect(0,0,256,256);
  return new THREE.CanvasTexture(cnv);
}
const nebulaColors = ["rgba(90,60,160,0.16)", "rgba(160,60,90,0.13)", "rgba(40,110,140,0.15)"];

  }));
  const r = 15000;
  const theta = Math.random() * Math.PI * 2;
  const phi = Math.acos(2 * Math.random() - 1);
  sp.position.set(r*Math.sin(phi)*Math.cos(theta), r*Math.sin(phi)*Math.sin(theta), r*Math.cos(phi));
  sp.scale.setScalar(6000 + Math.random() * 6000);

}

function makeLabel(text) {
  const cnv = document.createElement("canvas");
  cnv.width = 512; cnv.height = 128;
  const ctx = cnv.getContext("2d");
  ctx.font = "bold 56px monospace";
  ctx.textAlign = "center"; ctx.textBaseline = "middle";
  ctx.shadowColor = "rgba(110,231,216,0.9)"; ctx.shadowBlur = 18;
  ctx.fillStyle = "#bffef4";
  ctx.fillText(text, 256, 64);
  return new THREE.Sprite(new THREE.SpriteMaterial({
    map: new THREE.CanvasTexture(cnv),
    transparent: true, depthWrite: false, opacity: 0.85,
  }));
}

/* ============ 6. THE SHIP — welded from stock primitives ============
   Coordinate convention: the ship faces -Z (same direction the camera
   looks by default), so "forward" for physics and for the model agree. */
function buildShipMesh() {
  const ship = new THREE.Group();

  const hullMat   = new THREE.MeshStandardMaterial({ color: 0x9aa4ad, metalness: 0.7, roughness: 0.35 });
  const darkMat   = new THREE.MeshStandardMaterial({ color: 0x3a4148, metalness: 0.6, roughness: 0.5 });
  const accentMat = new THREE.MeshStandardMaterial({ color: 0x14b8a6, metalness: 0.4, roughness: 0.4, emissive: 0x0a5c52, emissiveIntensity: 0.5 });
  const glassMat  = new THREE.MeshStandardMaterial({ color: 0x1a3448, metalness: 0.9, roughness: 0.1, transparent: true, opacity: 0.9 });

  // fuselage
  const hull = new THREE.Mesh(new THREE.BoxGeometry(2.6, 0.9, 7), hullMat);
  ship.add(hull);

  // nose cone (cone points +Y by default; rotate so it points -Z)
  const nose = new THREE.Mesh(new THREE.ConeGeometry(0.9, 2.6, 6), hullMat);
  nose.rotation.x = -Math.PI / 2;
  nose.position.set(0, 0, -4.6);
  ship.add(nose);

  // cockpit canopy: half-sphere stretched into a teardrop
  const canopy = new THREE.Mesh(
    new THREE.SphereGeometry(0.7, 16, 12, 0, Math.PI * 2, 0, Math.PI / 2),
    glassMat
  );
  canopy.scale.set(1, 0.75, 1.7);
  canopy.position.set(0, 0.45, -1.6);
  ship.add(canopy);

  // swept wings (dihedral tilt + backward sweep, like an X-wing's cousin)
  const wingGeo = new THREE.BoxGeometry(3.4, 0.12, 2.1);
  const wingL = new THREE.Mesh(wingGeo, darkMat);
  wingL.position.set(-2.5, -0.1, 1.3);
  wingL.rotation.z = 0.09;   // dihedral: tips slightly up
  wingL.rotation.y = -0.35;  // sweep: trailing edge back
  ship.add(wingL);
  const wingR = new THREE.Mesh(wingGeo, darkMat);
  wingR.position.set(2.5, -0.1, 1.3);
  wingR.rotation.z = -0.09;
  wingR.rotation.y = 0.35;
  ship.add(wingR);

  // wingtip accent lights
  const tipGeo = new THREE.BoxGeometry(0.25, 0.2, 1.0);
  const tipL = new THREE.Mesh(tipGeo, accentMat);
  tipL.position.set(-4.0, 0.05, 1.85);
  ship.add(tipL);
  const tipR = new THREE.Mesh(tipGeo, accentMat);
  tipR.position.set(4.0, 0.05, 1.85);
  ship.add(tipR);

  // tail fin
  const fin = new THREE.Mesh(new THREE.BoxGeometry(0.12, 1.4, 1.7), darkMat);
  fin.position.set(0, 0.9, 2.9);
  ship.add(fin);

  // dorsal accent stripe
  const stripe = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.06, 6.4), accentMat);
  stripe.position.set(0, 0.49, -0.2);
  ship.add(stripe);

  // twin engine nacelles
  const engGeo = new THREE.CylinderGeometry(0.42, 0.55, 1.8, 10);
  for (const side of [-1, 1]) {
    const eng = new THREE.Mesh(engGeo, darkMat);
    eng.rotation.x = Math.PI / 2;
    eng.position.set(side * 1.05, -0.05, 3.4);
    ship.add(eng);
  }

  // engine glow sprites (teal, rear) — scaled by throttle each frame
  const engineGlows = [];
  for (const side of [-1, 1]) {
    const glow = new THREE.Sprite(new THREE.SpriteMaterial({
      map: softBlobTexture("rgba(110,231,216,0.95)"),
      transparent: true, depthWrite: false, blending: THREE.AdditiveBlending,
    }));
    glow.position.set(side * 1.05, -0.05, 4.5);
    glow.scale.setScalar(0.001);
    ship.add(glow);
    engineGlows.push(glow);
  }
  // retro-thruster glows (amber, nose) — light up in reverse
  const retroGlows = [];
  for (const side of [-1, 1]) {
    const glow = new THREE.Sprite(new THREE.SpriteMaterial({
      map: softBlobTexture("rgba(255,176,102,0.95)"),
      transparent: true, depthWrite: false, blending: THREE.AdditiveBlending,
    }));
    glow.position.set(side * 0.75, 0, -3.6);
    glow.scale.setScalar(0.001);
    ship.add(glow);
    retroGlows.push(glow);
  }

  return { mesh: ship, engineGlows, retroGlows };
}

/* ============ 7. BODY BUILDER ============ */

function buildBody(cfg) {
  const group = new THREE.Group();

  if (cfg.type === "star") {

    }));

    group.add(glow);
  } else {
    let texs, matOpts = { metalness: 0.0 };

      matOpts.roughnessMap = texs.roughnessMap;
      matOpts.bumpMap = texs.bumpMap;
    } else if (cfg.style === "gas") {

      matOpts.roughness = 0.85;
    } else {
      texs = genRocky(cfg);

      matOpts.bumpMap = texs.bumpMap;
    }

    const mat = new THREE.MeshStandardMaterial(matOpts);
    if (mat.bumpMap) mat.bumpScale = cfg.radius * 0.02;
    const mesh = new THREE.Mesh(new THREE.SphereGeometry(cfg.radius, 64, 48), mat);
    mesh.name = "surface";

    if (cfg.clouds) {
      const cloudMesh = new THREE.Mesh(
        new THREE.SphereGeometry(cfg.radius * 1.025, 48, 32),
        new THREE.MeshStandardMaterial({
          map: genClouds(cfg.seed),

        })
      );
      group.add(cloudMesh);
      cloudLayers.push({ mesh: cloudMesh, speed: (cfg.spin || 0.01) * 6 });
    }

    if (cfg.atmosphere) {
      group.add(makeAtmosphere(cfg.radius, cfg.atmosphere, cfg.atmoStrength ?? 0.8));
    }

    if (cfg.rings) {
      const ring = new THREE.Mesh(
        new THREE.RingGeometry(cfg.rings.inner, cfg.rings.outer, 64),
        new THREE.MeshBasicMaterial({ color: cfg.rings.color, side: THREE.DoubleSide, transparent: true, opacity: 0.5 })
      );
      ring.rotation.x = Math.PI / 2.4;
      group.add(ring);
      const ring2 = new THREE.Mesh(
        new THREE.RingGeometry(cfg.rings.inner * 0.92, cfg.rings.inner * 0.98, 64),
        new THREE.MeshBasicMaterial({ color: cfg.rings.color, side: THREE.DoubleSide, transparent: true, opacity: 0.8 })
      );
      ring2.rotation.x = Math.PI / 2.4;
      group.add(ring2);
    }

    if (cfg.belt) {
      const rocks = new THREE.InstancedMesh(
        new THREE.DodecahedronGeometry(1, 0),
        new THREE.MeshStandardMaterial({ color: 0x8a8378, roughness: 1, flatShading: true }),
        cfg.belt.count
      );
      const dummy = new THREE.Object3D();
      for (let i = 0; i < cfg.belt.count; i++) {
        const ang = Math.random() * Math.PI * 2;
        const dist = cfg.belt.inner + Math.random() * (cfg.belt.outer - cfg.belt.inner);
        dummy.position.set(Math.cos(ang) * dist, (Math.random() - 0.5) * 26, Math.sin(ang) * dist);
        dummy.rotation.set(Math.random()*6.28, Math.random()*6.28, Math.random()*6.28);
        dummy.scale.setScalar(1.5 + Math.random() * 6);
        dummy.updateMatrix();
        rocks.setMatrixAt(i, dummy.matrix);
      }
      const beltGroup = new THREE.Group();
      beltGroup.rotation.x = Math.PI / 2.4 - Math.PI / 2;
      beltGroup.add(rocks);
      group.add(beltGroup);
      belts.push(beltGroup);
    }

    if (cfg.moon) {
      const moonTexs = genRocky({ seed: cfg.moon.seed ?? 3, palette: {
        dark: 0x555a60, mid: 0x8d939b, light: 0xc4c9cf,
      }});
      const moonMat = new THREE.MeshStandardMaterial({
        map: moonTexs.map, bumpMap: moonTexs.bumpMap, roughness: 1,
      });
      moonMat.bumpScale = cfg.moon.radius * 0.03;
      const moon = new THREE.Mesh(new THREE.SphereGeometry(cfg.moon.radius, 32, 24), moonMat);
      moon.userData.orbit = { distance: cfg.moon.distance, speed: cfg.moon.speed, angle: Math.random() * 6.28 };
      moon.name = "moon";
      group.add(moon);
    }

    const label = makeLabel(cfg.name);
    label.position.y = cfg.radius * 1.7;
    label.scale.set(cfg.radius * 2.2, cfg.radius * 0.55, 1);
    group.add(label);
  }

  scene.add(group);
  liveBodies.push({ cfg, group });
}

/* ============ 9. ENGINE AUDIO ============ */
let audio = null;
function initAudio() {
  if (audio) return;
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const gain = ctx.createGain(); gain.gain.value = 0;
  const filter = ctx.createBiquadFilter();
  filter.type = "lowpass"; filter.frequency.value = 220;
  const osc1 = ctx.createOscillator(); osc1.type = "sawtooth"; osc1.frequency.value = 48;
  const osc2 = ctx.createOscillator(); osc2.type = "sawtooth"; osc2.frequency.value = 48.7;
  osc1.connect(filter); osc2.connect(filter);
  filter.connect(gain); gain.connect(ctx.destination);
  osc1.start(); osc2.start();
  audio = { ctx, gain, filter, osc1, osc2 };
}
function thump(strength) {
  if (!audio) return;
  const { ctx } = audio;
  const len = ctx.sampleRate * 0.15;
  const buf = ctx.createBuffer(1, len, ctx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < len; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / len);
  const src = ctx.createBufferSource(); src.buffer = buf;
  const f = ctx.createBiquadFilter(); f.type = "lowpass"; f.frequency.value = 150;
  const g = ctx.createGain(); g.gain.value = Math.min(0.5, strength / 400);
  src.connect(f); f.connect(g); g.connect(ctx.destination);
  src.start();
}
["keydown", "mousedown", "touchstart"].forEach(ev => addEventListener(ev, initAudio));

/* ============ 10. SHIP OBJECT + CAMERA RIG ============
   shipObj carries all physics. The camera is now just a viewer. */

let firstPerson = true;                          // start in the cockpit
const CHASE_OFFSET = new THREE.Vector3(0, 4.5, 17); // behind & above, in ship-local space
const tmpOffset = new THREE.Vector3();
const viewTag = document.getElementById("viewtag");

let bank = 0;                        // current cosmetic lean, radians
const MAX_BANK = 0.35;               // ~20° at a full-rate turn
const bankQ = new THREE.Quaternion();
const Z_AXIS = new THREE.Vector3(0, 0, 1);

function toggleView() {

/* ============ 11. INPUT ============ */
const keys = {};
addEventListener("keydown", e => {
  if (e.code === "KeyV" && !keys["KeyV"]) toggleView(); // fire once per press
  keys[e.code] = true;
});
addEventListener("keyup", e => keys[e.code] = false);

/* Pointer Lock: click the canvas → the browser hides the cursor and hands
   us RELATIVE mouse motion (e.movementX/Y). The ship only turns while the
   mouse is actually moving — let go of the mouse, the ship flies straight.
   ESC releases the lock (that's built into the browser, not our code). */
let mouseDX = 0, mouseDY = 0;   // deltas accumulated since last frame
renderer.domElement.addEventListener("click", () => {
  if (document.pointerLockElement !== renderer.domElement)
    renderer.domElement.requestPointerLock();
});
addEventListener("mousemove", e => {
  if (document.pointerLockElement === renderer.domElement) {
    mouseDX += e.movementX;
    mouseDY += e.movementY;
  }
});

const steer = { x: 0, y: 0 };   // rate-based steering — still used by touch drag

let touchThrust = false, touchBrake = false, touchRev = false;
if (matchMedia("(pointer: coarse)").matches) document.body.classList.add("touch");

let steerTouchId = null, steerStart = null;
addEventListener("touchstart", e => {
  for (const t of e.changedTouches) {
    if (t.target.classList && t.target.classList.contains("touchbtn")) continue;
    if (steerTouchId === null) { steerTouchId = t.identifier; steerStart = { x: t.clientX, y: t.clientY }; }
  }
}, { passive: true });
addEventListener("touchmove", e => {
  for (const t of e.changedTouches) {
    if (t.identifier === steerTouchId) {
      steer.x = Math.max(-1, Math.min(1, (t.clientX - steerStart.x) / 120));
      steer.y = Math.max(-1, Math.min(1, (t.clientY - steerStart.y) / 120));
    }
  }
}, { passive: true });
addEventListener("touchend", e => {
  for (const t of e.changedTouches) {
    if (t.identifier === steerTouchId) { steerTouchId = null; steer.x = 0; steer.y = 0; }
  }
});
const bindHold = (id, setter) => {
  const el = document.getElementById(id);
  el.addEventListener("touchstart", e => { e.preventDefault(); initAudio(); setter(true); });
  el.addEventListener("touchend",   e => { e.preventDefault(); setter(false); });
};
bindHold("btnThrust", v => touchThrust = v);
bindHold("btnBrake",  v => touchBrake  = v);
bindHold("btnRev",    v => touchRev    = v);
document.getElementById("btnView").addEventListener("touchstart", e => {
  e.preventDefault(); initAudio(); toggleView();
});

/* ============ 12. GAME LOOP ============ */
const clock = new THREE.Clock();
const speedEl = document.getElementById("speed");
const nearNameEl = document.getElementById("nearName");
const nearDistEl = document.getElementById("nearDist");
const throttleFwd = document.getElementById("throttlefwd");
const throttleRev = document.getElementById("throttlerev");
const alarmEl = document.getElementById("alarm");
const revTag = document.getElementById("revtag");
const tmpDir = new THREE.Vector3();
const tmpNormal = new THREE.Vector3();
let prevNearestDist = Infinity;
let prevNearestBody = null;

function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);

  /* ---- steering ---- */
  // pointer-lock freelook: deltas are "pixels of mouse travel", already
  // frame-rate independent — we just drain whatever accumulated
  const MOUSE_SENS = 0.0022;
  const mouseYaw = -mouseDX * MOUSE_SENS;
  shipObj.rotateY(mouseYaw);
  shipObj.rotateX(-mouseDY * MOUSE_SENS);
  mouseDX = 0; mouseDY = 0;

  // touch drag steering (rate-based, unchanged from v5)
  const dead = 0.08;
  const sx = Math.abs(steer.x) > dead ? steer.x : 0;
  const sy = Math.abs(steer.y) > dead ? steer.y : 0;
  shipObj.rotateY(-sx * ship.turnSpeed * dt);
  shipObj.rotateX(-sy * ship.turnSpeed * dt);

  let keyYaw = 0, keyPitch = 0;
  if (keys["ArrowLeft"])  keyYaw += 1;                   // turn left
  if (keys["ArrowRight"]) keyYaw -= 1;                   // turn right
  if (keys["ArrowUp"])   keyPitch += 1;                  // nose up
  if (keys["ArrowDown"]) keyPitch -= 1;                  // nose down
  shipObj.rotateY(keyYaw   * ship.turnSpeed * dt);
  shipObj.rotateX(keyPitch * ship.turnSpeed * dt);
  if (keys["KeyA"]) shipObj.rotateZ( 1.5 * dt);          // roll left
  if (keys["KeyD"]) shipObj.rotateZ(-1.5 * dt);          // roll right

  /* ---- auto-bank: the ship LEANS into turns, purely visual ----
     Physics (shipObj) never rolls; only the mesh / camera tilt, so the
     floaty flight model is untouched. yawFrac = how hard we're turning
     as a fraction of full keyboard turn rate, from any input source. */
  const yawFrac = Math.max(-1, Math.min(1,
    keyYaw - sx + (dt > 0 ? mouseYaw / (ship.turnSpeed * dt) : 0)));
  bank += (yawFrac * MAX_BANK - bank) * (1 - Math.exp(-5 * dt));

  shipObj.getWorldDirection(tmpDir);
  tmpDir.negate(); // getWorldDirection points +Z for Groups; our nose is -Z

  /* ---- throttle ---- */
  // W and S are mirror twins: W ramps the throttle up, S ramps it down
  // through zero into reverse. X is the full shutdown — throttle to zero
  // and scrub velocity until you're parked.
  if (keys["KeyW"] || touchThrust) ship.throttle = Math.min(1, ship.throttle + dt * 1.2);
  if (keys["KeyS"] || touchRev)    ship.throttle = Math.max(ship.minThrottle, ship.throttle - dt * 1.2);
  if (keys["KeyX"] || touchBrake) {
    ship.throttle = 0;
    ship.velocity.multiplyScalar(Math.pow(0.9, dt * 60));
  }

  const boost = (keys["ShiftLeft"] || keys["ShiftRight"]) ? ship.boostMult : 1;
  ship.velocity.addScaledVector(tmpDir, ship.throttle * ship.maxAccel * boost * dt);
  // drag: pow(damping, dt*60) applies the same drag PER SECOND on any
  // monitor — plain multiplyScalar(damping) would double the drag at 144Hz
  ship.velocity.multiplyScalar(Math.pow(ship.damping, dt * 60));
  shipObj.position.addScaledVector(ship.velocity, dt);

  /* ---- collisions (against the ship's position) ---- */
  const COLLIDE_BUFFER = 12;
  for (const b of liveBodies) {
    tmpNormal.subVectors(shipObj.position, b.group.position);
    let dist = tmpNormal.length();
    let minDist = b.cfg.radius + COLLIDE_BUFFER;
    if (dist < minDist) {
      tmpNormal.normalize();
      shipObj.position.copy(b.group.position).addScaledVector(tmpNormal, minDist);
      const into = ship.velocity.dot(tmpNormal);
      if (into < 0) {
        thump(-into);
        ship.velocity.addScaledVector(tmpNormal, -into * 1.3);
      }
    }
    const moon = b.group.getObjectByName("moon");
    if (moon) {
      tmpNormal.copy(moon.position).add(b.group.position).sub(shipObj.position).negate();
      dist = tmpNormal.length();
      minDist = b.cfg.moon.radius + COLLIDE_BUFFER;
      if (dist < minDist) {
        tmpNormal.normalize();
        shipObj.position.copy(b.group.position).add(moon.position).addScaledVector(tmpNormal, minDist);
        const into = ship.velocity.dot(tmpNormal);
        if (into < 0) {
          thump(-into);
          ship.velocity.addScaledVector(tmpNormal, -into * 1.3);
        }
      }
    }
  }

  /* ---- camera rig ---- */
  if (firstPerson) {
    shipMesh.visible = false;                 // don't render the hull in your face
    camera.position.copy(shipObj.position);
    // half-strength lean in the cockpit — you tilt your head into the turn
    bankQ.setFromAxisAngle(Z_AXIS, bank * 0.5);
    camera.quaternion.copy(shipObj.quaternion).multiply(bankQ);
  } else {
    shipMesh.visible = true;
    shipMesh.rotation.z = bank;               // the model leans, the physics don't
    // desired camera spot: CHASE_OFFSET rotated into the ship's frame
    tmpOffset.copy(CHASE_OFFSET).applyQuaternion(shipObj.quaternion);
    tmpOffset.add(shipObj.position);
    // exponential easing — framerate-independent smooth pursuit.
    // The camera closes ~99.97% of the gap per second but never snaps,
    // which is what lets you see the ship bank during hard turns.
    const k = 1 - Math.exp(-8 * dt);
    camera.position.lerp(tmpOffset, k);
    camera.quaternion.slerp(shipObj.quaternion, 1 - Math.exp(-6 * dt));
  }

  /* ---- engine glows track the throttle ---- */
  const fwdBurn = Math.max(0, ship.throttle) * (boost > 1 ? 1.5 : 1);
  const revBurn = Math.max(0, -ship.throttle) * 2;
  const flicker = 0.9 + Math.random() * 0.2;   // a little instability reads as fire
  for (const g of engineGlows) g.scale.setScalar(Math.max(0.001, fwdBurn * 2.4 * flicker));
  for (const g of retroGlows)  g.scale.setScalar(Math.max(0.001, revBurn * 1.4 * flicker));

  /* ---- animate bodies ---- */
  for (const b of liveBodies) {
    if (b.cfg.spin || b.cfg.type === "star") {
      const surf = b.group.getObjectByName("surface");
      if (surf) surf.rotation.y += (b.cfg.spin || 0.004) * dt * 10;
    }
    const moon = b.group.getObjectByName("moon");
    if (moon) {
      const o = moon.userData.orbit;
      o.angle += o.speed * dt;
      moon.position.set(Math.cos(o.angle) * o.distance, 0, Math.sin(o.angle) * o.distance);
    }
  }
  for (const belt of belts) belt.rotation.y += 0.02 * dt;
  for (const c of cloudLayers) c.mesh.rotation.y += c.speed * dt;

  /* ---- the sky rides along — you can never leave the starfield ---- */
  skyShell.position.copy(shipObj.position);

  /* ---- space dust wraps around the SHIP ---- */
  const p = dust.geometry.attributes.position.array;
  const cx = shipObj.position.x, cy = shipObj.position.y, cz = shipObj.position.z;
  for (let i = 0; i < p.length; i += 3) {
    p[i]   = (((p[i]   - cx + DUST_HALF) % DUST_SIZE) + DUST_SIZE) % DUST_SIZE - DUST_HALF + cx;
    p[i+1] = (((p[i+1] - cy + DUST_HALF) % DUST_SIZE) + DUST_SIZE) % DUST_SIZE - DUST_HALF + cy;
    p[i+2] = (((p[i+2] - cz + DUST_HALF) % DUST_SIZE) + DUST_SIZE) % DUST_SIZE - DUST_HALF + cz;
  }
  dust.geometry.attributes.position.needsUpdate = true;
  const spd = ship.velocity.length();
  dustMat.opacity = Math.min(0.65, spd / 350);

  if (audio) {
    const t = Math.abs(ship.throttle);
    const boosting = boost > 1 && ship.throttle > 0;
    audio.gain.gain.value = t * 0.10 * (boosting ? 1.7 : 1);
    audio.filter.frequency.value = 180 + t * 500 + (boosting ? 400 : 0);
    const f = 44 + t * 38 + (boosting ? 14 : 0);
    audio.osc1.frequency.value = f;
    audio.osc2.frequency.value = f * 1.014;
  }

  speedEl.textContent = Math.round(spd);
  revTag.style.visibility = ship.throttle < -0.01 ? "visible" : "hidden";
  if (ship.throttle >= 0) {
    throttleFwd.style.height = (ship.throttle * 67) + "%";
    throttleRev.style.height = "0%";
  } else {
    throttleFwd.style.height = "0%";
    throttleRev.style.height = (Math.abs(ship.throttle) / 0.5 * 33) + "%";
  }

  let nearest = null, nearestDist = Infinity;
  for (const b of liveBodies) {
    const d = shipObj.position.distanceTo(b.group.position) - b.cfg.radius;
    if (d < nearestDist) { nearestDist = d; nearest = b; }
  }
  if (nearest) {
    nearNameEl.textContent = nearest.cfg.name;
    nearDistEl.textContent = Math.round(nearestDist).toLocaleString() + " u";
  }
  // closing speed only means something if we're comparing distances to the
  // SAME body — when the "nearest" title changes hands, skip one frame
  if (nearest !== prevNearestBody) prevNearestDist = nearestDist;
  const closingSpeed = (prevNearestDist - nearestDist) / dt;
  alarmEl.style.visibility = (nearestDist < 250 && closingSpeed > 60) ? "visible" : "hidden";
  prevNearestDist = nearestDist;
  prevNearestBody = nearest;

  renderer.render(scene, camera);
}

setTimeout(() => {
  BODIES.forEach(buildBody);
  document.getElementById("loading").style.display = "none";
  animate();
}, 60);

addEventListener("resize", () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
